<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Culimaat</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #373c2b;
      --bg:     #b3a79d;
      --white:  #f5f2ec;
      --gold:   #9a8b6e;
      --muted:  rgba(43,47,33,0.42);
      --text:   #2b2f21;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
    }

    /* GRAIN */
    .grain {
      position: fixed; inset: -50%; width: 200%; height: 200%;
      z-index: 999; pointer-events: none; opacity: 0.13;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 160px 160px;
      animation: grain 0.6s steps(1) infinite;
    }
    @keyframes grain {
      0%{transform:translate(0,0)} 10%{transform:translate(-3%,-4%)} 20%{transform:translate(4%,2%)}
      30%{transform:translate(-2%,5%)} 40%{transform:translate(5%,-2%)} 50%{transform:translate(-4%,1%)}
      60%{transform:translate(2%,-5%)} 70%{transform:translate(-5%,3%)} 80%{transform:translate(1%,-3%)}
      90%{transform:translate(4%,5%)} 100%{transform:translate(-3%,0)}
    }

    /* INTRO */
    #intro {
      position: fixed; inset: 0; z-index: 50; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 0.6rem;
    }
    #intro.hide { animation: introOut 0.9s forwards; pointer-events: none; }
    @keyframes introOut { 100%{ opacity:0; transform:scale(1.04); } }

    .intro-logo { opacity: 0; animation: logoIn 1.2s cubic-bezier(0.16,1,0.3,1) 0.3s forwards; }
    @keyframes logoIn { 0%{opacity:0;transform:translateY(12px)} 100%{opacity:1;transform:translateY(0)} }
    .intro-logo img { height: 56px; }

    .intro-sub {
      font-size: 0.5rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--green); opacity: 0; animation: fadeUp 1s ease 1s forwards;
    }
    .intro-line {
      width: 0; height: 1px; background: var(--muted); margin-top: 1.4rem;
      animation: lineGrow 0.8s ease 1.4s forwards;
    }
    @keyframes lineGrow { 100%{ width:48px; opacity:1; } }
    @keyframes fadeUp { 0%{opacity:0;transform:translateY(6px)} 100%{opacity:0.7;transform:translateY(0)} }

    /* LANDING */
    #landing {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column; background: var(--bg);
      opacity: 0; pointer-events: none; transition: opacity 0.8s;
    }
    #landing.visible { opacity: 1; pointer-events: all; }

    .nav {
      display: flex; align-items: center; justify-content: center;
      padding: 1.8rem 2.2rem 0; flex-shrink: 0;
    }
    .nav img { height: 48px; }

    .hero {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1rem 2.2rem; text-align: center; gap: 1.6rem;
    }

    .hero-eyebrow {
      font-size: 0.5rem; letter-spacing: 0.36em;
      text-transform: uppercase; color: var(--muted);
    }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 10vw, 4.2rem);
      font-weight: 300; line-height: 1.1; color: var(--text);
    }
    .hero-title em { font-style: italic; color: rgba(43,47,33,0.42); }

    .scan-bracket {
      position: relative; width: 130px; height: 130px;
      display: flex; align-items: center; justify-content: center;
    }
    .corner { position: absolute; width: 20px; height: 20px; border-color: rgba(43,47,33,0.28); border-style: solid; }
    .corner.tl { top:0; left:0; border-width: 1px 0 0 1px; }
    .corner.tr { top:0; right:0; border-width: 1px 1px 0 0; }
    .corner.bl { bottom:0; left:0; border-width: 0 0 1px 1px; }
    .corner.br { bottom:0; right:0; border-width: 0 1px 1px 0; }
    .scan-line {
      position: absolute; left: 2px; right: 2px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      animation: scanline 2.6s ease-in-out infinite;
    }
    @keyframes scanline { 0%{top:2px;opacity:0} 8%{opacity:0.8} 92%{opacity:0.8} 100%{top:calc(100% - 2px);opacity:0} }
    .scan-label { font-size: 0.48rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); }

    .brand-quote {
      max-width: 280px; font-family: 'Cormorant Garamond', serif;
      font-size: 0.92rem; font-style: italic;
      color: rgba(43,47,33,0.48); line-height: 1.85;
    }

    .cta-wrap { display: flex; flex-direction: column; align-items: center; gap: 0.7rem; }
    .cta-btn {
      background: var(--green); color: var(--white); border: none;
      padding: 1rem 3rem; font-family: 'Jost', sans-serif;
      font-size: 0.63rem; font-weight: 500; letter-spacing: 0.28em;
      text-transform: uppercase; cursor: pointer;
    }
    .cta-hint { font-size: 0.5rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }

    /* AR UI */
    #ar-ui {
      position: fixed; inset: 0; z-index: 10;
      pointer-events: none; display: none;
      flex-direction: column; justify-content: space-between;
    }
    #ar-ui.active { display: flex; }

    .ar-header {
      pointer-events: all;
      display: flex; align-items: center; justify-content: center;
      padding: 1.4rem 1.8rem;
      background: linear-gradient(to bottom, rgba(179,167,157,0.85), transparent);
    }
    .ar-header img { height: 36px; }

    .ar-bottom {
      pointer-events: all;
      display: flex; flex-direction: column; align-items: center; gap: 0.8rem;
      padding: 1rem 1.8rem 2.4rem;
      background: linear-gradient(to top, rgba(179,167,157,0.85), transparent);
    }
    .ar-hint { font-size: 0.54rem; letter-spacing: 0.18em; text-transform: uppercase; color: white; text-shadow: 0 1px 3px rgba(0,0,0,0.4); }
    .ar-controls { display: flex; gap: 0.5rem; }
    .ar-btn {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      color: white; padding: 0.6rem 1.1rem; font-family: 'Jost', sans-serif;
      font-size: 0.56rem; letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer;
    }

    #toast {
      position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); z-index: 30;
      background: rgba(179,167,157,0.96); border: 1px solid rgba(43,47,33,0.12);
      padding: 0.65rem 1.6rem; font-size: 0.56rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--green); white-space: nowrap;
      opacity: 0; transition: opacity 0.4s; pointer-events: none;
    }
    #toast.show { opacity: 1; }

    .a-enter-vr-button, .a-orientation-modal, .a-loader-title { display: none !important; }
  </style>
</head>
<body>

<div class="grain"></div>

<!-- INTRO -->
<div id="intro">
  <div class="intro-logo"><img src="culimaat-logo.png" alt="Culimaat"/></div>
  <div class="intro-sub">High End Kitchens</div>
  <div class="intro-line"></div>
</div>

<!-- LANDING -->
<div id="landing">
  <div class="nav"><img src="culimaat-logo.png" alt="Culimaat"/></div>
  <div class="hero">
    <div class="hero-eyebrow">Augmented Reality</div>
    <div class="hero-title">Your kitchen,<br><em>your space</em></div>
    <div class="scan-bracket">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="scan-line"></div>
      <div class="scan-label">Scan</div>
    </div>
    <div class="brand-quote">
      In everything we do, we want to be better. Driven by innovation, we never give in to comfort zones. Beyond dreams and imagination.
    </div>
    <div class="cta-wrap">
      <button class="cta-btn" onclick="startAR()">Start</button>
      <div class="cta-hint">Point camera at your floor plan</div>
    </div>
  </div>
</div>

<!-- AR SCENE -->
<a-scene
  mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:5; display:none;"
>
  <a-assets>
    <a-asset-item id="kitchen-model" src="Untitled_2.glb"></a-asset-item>
  </a-assets>
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
  <a-entity mindar-image-target="targetIndex: 0">
    <a-light type="ambient" intensity="0.9"></a-light>
    <a-light type="directional" intensity="1.2" position="1 2 1"></a-light>
    <a-gltf-model id="kitchen" src="#kitchen-model" position="0 0 0" rotation="-90 0 0" scale="0.001 0.001 0.001"></a-gltf-model>
  </a-entity>
</a-scene>

<!-- AR UI -->
<div id="ar-ui">
  <div class="ar-header"><img src="culimaat-logo.png" alt="Culimaat"/></div>
  <div class="ar-bottom">
    <div class="ar-hint" id="ar-hint">Point camera at the floor plan</div>
    <div class="ar-controls">
      <button class="ar-btn" onclick="stopAR()">← Back</button>
      <button class="ar-btn" onclick="scaleUp()">Scale +</button>
      <button class="ar-btn" onclick="scaleDown()">Scale −</button>
    </div>
  </div>
</div>

<div id="toast">Kitchen detected</div>

<script>
  let arSystem;
  let currentScale = 0.001;
  const step = 0.0003;

  // Intro
  window.addEventListener('load', () => {
    setTimeout(() => {
      const intro = document.getElementById('intro');
      intro.classList.add('hide');
      setTimeout(() => {
        intro.style.display = 'none';
        document.getElementById('landing').classList.add('visible');
      }, 900);
    }, 2600);
  });

  function startAR() {
    document.getElementById('landing').style.display = 'none';

    const scene = document.querySelector('a-scene');
    scene.style.display = 'block';
    document.getElementById('ar-ui').classList.add('active');

    scene.addEventListener('loaded', () => {
      arSystem = scene.systems['mindar-image-system'];
      if (arSystem) arSystem.start();
    }, { once: true });

    if (scene.hasLoaded) {
      arSystem = scene.systems['mindar-image-system'];
      if (arSystem) arSystem.start();
    }

    scene.addEventListener('targetFound', () => {
      document.getElementById('ar-hint').textContent = 'Move around to explore';
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    });

    scene.addEventListener('targetLost', () => {
      document.getElementById('ar-hint').textContent = 'Point camera at the floor plan';
    });
  }

  function stopAR() {
    if (arSystem) arSystem.stop();
    document.querySelector('a-scene').style.display = 'none';
    document.getElementById('ar-ui').classList.remove('active');
    const landing = document.getElementById('landing');
    landing.style.display = 'flex';
    landing.classList.add('visible');
  }

  function scaleUp() {
    currentScale = Math.min(currentScale + step, 0.006);
    document.getElementById('kitchen').setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
  }

  function scaleDown() {
    currentScale = Math.max(currentScale - step, 0.0001);
    document.getElementById('kitchen').setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
  }
</script>

</body>
</html>
